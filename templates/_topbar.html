<header class="topbar raised-card parchment-card">
  <div class="topbar-inner">
    <div class="topbar-left">
      <a href="{{ url_for('index') }}" class="brand-mark" aria-label="LineAgeMap home">
        <span class="brand-mark-icon"><img src="{{ url_for('static', filename='img/logo.png') }}" alt="LineAgeMap logo"></span>
      </a>

      <nav class="desktop-nav topbar-center-nav" aria-label="Primary navigation">
        <a href="{{ url_for('tree') }}">Tree</a>
        {% if logged_in_user %}
        <a href="{{ url_for('dashboard') }}">Workspace</a>
        <a href="{{ url_for('logout') }}">Logout</a>
        {% else %}
        <a href="{{ url_for('login') }}">Login</a>
        {% endif %}
      </nav>
    </div>

    <div class="brand-mark-title">LineAgeMap</div>

    <div class="topbar-right">
      <form class="family-switcher" action="{{ url_for('select_family') }}" method="get">
        <input type="hidden" name="next" value="{{ request.full_path if request.query_string else request.path }}">
        <label class="family-switcher-label" for="desktopFamilySelect">Family</label>
        <select id="desktopFamilySelect" name="family" onchange="this.form.submit()">
          {% for family in family_options %}
          <option value="{{ family.id }}" {% if family.id == current_family_id %}selected{% endif %}>{{ family.label }}</option>
          {% endfor %}
        </select>
      </form>

      <button class="nav-toggle" type="button" aria-label="Open menu" aria-expanded="false" aria-controls="mobileMenu">
        <span></span>
        <span></span>
        <span></span>
      </button>
    </div>
  </div>

  <nav class="mobile-nav" id="mobileMenu" aria-label="Mobile navigation">
    <div class="mobile-nav-links">
      <a href="{{ url_for('tree') }}">🌿 Tree</a>
      {% if logged_in_user %}
      <a href="{{ url_for('dashboard') }}">👤 Workspace</a>
      <a href="{{ url_for('logout') }}">↩ Logout</a>
      {% else %}
      <a href="{{ url_for('login') }}">🔐 Login</a>
      {% endif %}
    </div>
    <form class="family-switcher family-switcher-mobile" action="{{ url_for('select_family') }}" method="get">
      <input type="hidden" name="next" value="{{ request.full_path if request.query_string else request.path }}">
      <label class="family-switcher-label" for="mobileFamilySelect">Family</label>
      <select id="mobileFamilySelect" name="family" onchange="this.form.submit()">
        {% for family in family_options %}
        <option value="{{ family.id }}" {% if family.id == current_family_id %}selected{% endif %}>{{ family.label }}</option>
        {% endfor %}
      </select>
    </form>
  </nav>
</header>
