{% extends "base.html" %}
{% block title %}Tree | LineAgeMap
{% endblock %}
{% block body_class %}landing-page tree-page{% endblock %}
{% block content %}
<section class="tree-page-card raised-card parchment-card">
  <div class="section-head wide-gap tree-page-head" style="text-align:center; justify-content:center;">
    <div>
      <h1>{{ family_name }}</h1>
    </div>
  </div>

  <div class="treeToolbar" role="group" aria-label="Tree controls">
    <button id="treeDepthToggleBtn" class="treeToolbarBtn" type="button">See Full Tree</button>
  </div>

  <div class="tree-frame landing-tree-frame tree-frame--page">
    <div id="treeCanvas" class="treeCanvas treeCanvas--page" data-tree-api-url="{{ tree_api_url }}">
      <svg id="treeSvg" role="img" aria-label="Family tree diagram"></svg>
    </div>
  </div>
</section>
{% endblock %}

{% block scripts %}
<script>window.TREE_API_URL = {{ tree_api_url|tojson }};</script>
<script type="module" src="{{ url_for('static', filename='js/tree.js') }}"></script>

{% endblock %}
