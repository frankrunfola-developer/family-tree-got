<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>{% block title %}LineAgeMap{% endblock %}</title>
    <link rel="icon" href="{{ url_for('static', filename='favicon.ico') }}" type="image/x-icon" />
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@500;600;700&family=Libre+Baskerville:wght@400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/app.css') }}?v=20260411-dashboardlanding11">
    {% block head_extras %}{% endblock %}
  </head>
  <body class="{% block body_class %}{% endblock %}{% if logged_in_user %} authenticated-user{% endif %}">
    <main class="page-shell">
      {% include '_topbar.html' %}
      {% with messages = get_flashed_messages() %}
        {% if messages %}
        <div class="flash-stack">{% for message in messages %}<div class="flash-card raised-card parchment-card">{{ message }}</div>{% endfor %}</div>
        {% endif %}
      {% endwith %}
      {% block content %}{% endblock %}
    </main>
    <script>
      document.addEventListener('DOMContentLoaded', () => {
        const topbar = document.querySelector('.topbar');
        const toggle = document.querySelector('.nav-toggle');
        const mobileNav = document.querySelector('.mobile-nav');

        const syncTopbar = () => {
          if (!topbar) return;
          topbar.classList.toggle('is-scrolled', window.scrollY > 10);
        };

        syncTopbar();
        window.addEventListener('scroll', syncTopbar, { passive: true });

        if (!topbar || !toggle || !mobileNav) return;

        const closeMobileNav = () => {
          topbar.classList.remove('menu-open');
          mobileNav.classList.remove('is-open');
          toggle.classList.remove('is-open');
          toggle.setAttribute('aria-expanded', 'false');
        };

        const openMobileNav = () => {
          topbar.classList.add('menu-open');
          mobileNav.classList.add('is-open');
          toggle.classList.add('is-open');
          toggle.setAttribute('aria-expanded', 'true');
        };

        const toggleMobileNav = (event) => {
          event.preventDefault();
          event.stopPropagation();
          const isOpen = topbar.classList.contains('menu-open');
          if (isOpen) {
            closeMobileNav();
          } else {
            openMobileNav();
          }
        };

        toggle.addEventListener('click', toggleMobileNav);
        toggle.addEventListener('pointerdown', (event) => event.stopPropagation());

        document.addEventListener('click', (event) => {
          if (!topbar.classList.contains('menu-open')) return;
          if (mobileNav.contains(event.target) || toggle.contains(event.target)) return;
          closeMobileNav();
        });

        window.addEventListener('resize', () => {
          if (window.innerWidth > 900) closeMobileNav();
        });

        document.addEventListener('keydown', (event) => {
          if (event.key === 'Escape') closeMobileNav();
        });

        mobileNav.querySelectorAll('a, button').forEach((el) => {
          el.addEventListener('click', () => closeMobileNav());
        });

        closeMobileNav();
      });
    </script>
    {% block scripts %}{% endblock %}
  </body>
</html>
