
<div class="tree-scale-stage" style="--canvas-width: {{ tree.canvas_width }}; --canvas-height: {{ tree.canvas_height }};">
  <div class="tree-canvas-dynamic" style="width: {{ tree.canvas_width }}px; height: {{ tree.canvas_height }}px;">
    {% for line in tree.connectors %}
      {% set is_vertical = line.x1 == line.x2 %}
      <span class="tree-link {{ 'vertical' if is_vertical else 'horizontal' }}"
        style="left: {{ [line.x1, line.x2]|min }}px; top: {{ [line.y1, line.y2]|min }}px; width: {{ (line.x2 - line.x1)|abs if not is_vertical else 6 }}px; height: {{ (line.y2 - line.y1)|abs if is_vertical else 6 }}px;"></span>
    {% endfor %}

    {% for person in tree.people %}
      <figure class="person-card-dynamic" style="left: {{ person.x }}px; top: {{ person.y }}px;">
        <div class="portrait-frame compact">
          <img src="{{ person.photo }}" alt="{{ person.name }} portrait">
        </div>
        <figcaption class="nameplate compact">
          <span class="person-name">{{ person.name }}</span>
          <span class="person-years">{{ person.years }}</span>
        </figcaption>
      </figure>
    {% endfor %}
  </div>
</div>
